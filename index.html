<!DOCTYPE html>
<html lang="pt-br">

   <head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="style.css">
     <title>Lista</title>
   </head>

   <body>
       <header id="cabecalho">
        
       </header>

       <main  id="principal">

        <div id="logo">
            <img src="logo_test.png" alt="logo viking com espada e machado cruzado" width="300" height="200">
        </div>
        <div id="principal__geral">



          <div class="campo__grupo">
            <label for="nome__item">Nome:</label>
            <input type="text" id="nome__item" placeholder="Ex: Lacre Sombrio">
          </div>

          <div class="campo__grupo">
            <label for="qtd">Quantidade:</label>
            <input type="number" id="qtd__item" min="1" value="1">
          </div>

          <button id="botao__adicionar">Adicionar ao Inventário</button>
          
        </div>

        <div id="principal__texto">
          
        </div>
              

       </main> 

       <footer id="rodape">
           <h2 id="rodape__texto"><a id= "link" href="https://www.linkedin.com/in/gabriel-costa-/">&#169; Gabriel Costa</a></h2>
       </footer>

       <script src="app.js"></script>

   </body>
   
</html>
